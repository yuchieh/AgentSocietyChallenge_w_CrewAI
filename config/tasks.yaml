analyze_user_task:
  description: >
    Use the tool to retrieve all background data for User ID "{user_id}".
    You MUST use the Interaction Tool Wrapper to query data.
    You MUST pass a valid JSON dictionary as Action Input, following these exact formats:
    
    First, query the user profile:
    Action: Interaction Tool Wrapper
    Action Input: {{"query_type": "user", "target_id": "{user_id}"}}
    
    Then, query the user's historical reviews:
    Action: Interaction Tool Wrapper
    Action Input: {{"query_type": "review_by_user", "target_id": "{user_id}"}}
    
    Understand their average stars, what words they commonly use, and their general sentiment.
  expected_output: >
    A detailed markdown profile of user {user_id}'s preferences and rating habits.
  agent: user_analyst

analyze_item_task:
  description: >
    Use the tool to retrieve all background data for Item ID "{item_id}".
    You MUST use the Interaction Tool Wrapper to query data.
    You MUST pass a valid JSON dictionary as Action Input, following these exact formats:
    
    First, query the item details:
    Action: Interaction Tool Wrapper
    Action Input: {{"query_type": "item", "target_id": "{item_id}"}}
    
    Then, query the item's historical reviews:
    Action: Interaction Tool Wrapper
    Action Input: {{"query_type": "review_by_item", "target_id": "{item_id}"}}
    
    Understand its categories, attributes, and overall public sentiment.
  expected_output: >
    A detailed markdown report of business {item_id}'s features, pros, and cons.
  agent: item_analyst

predict_review_task:
  description: >
    Using the User Profile and the Item Report from the previous tasks, predict the Stars (1.0 to 5.0) and write the Review Text.
    You MUST base your prediction on the actual data retrieved by the previous agents. Do NOT say the data was not found.
    Consider if the restaurant's features align with the user's historical preferences.
  expected_output: >
    Output ONLY a valid JSON object with exactly two keys: "stars" (a float from 1.0 to 5.0) and "review" (a string).
    Example: {{"stars": 4.5, "review": "The review text..."}}
    Do NOT include any text before or after the JSON object. Do NOT use double curly braces.
  agent: prediction_modeler
